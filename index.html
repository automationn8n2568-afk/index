<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบซักประวัติ - รพ.สต.บ้านขอม</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            /* พื้นหลังไล่เฉดสีพาสเทล ชมพู-ฟ้า-เขียวมินต์ สดใส ละมุนตา */
            background: linear-gradient(135deg, #FFF0F5 0%, #E6F2FF 50%, #E8FFF5 100%);
            min-height: 100vh;
        }
        /* เอฟเฟกต์การกดปุ่มบนมือถือให้มียืดหยุ่นเด้งๆ */
        .btn-press {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-press:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-gray-800">

    <div class="bg-white/90 backdrop-blur-md rounded-[32px] shadow-[0_20px_50px_rgba(150,170,200,0.15)] p-6 w-full max-w-md border border-white/60">
        
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-[#E6F2FF] text-[#4A90E2] rounded-3xl mb-3 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </div>
            <h1 id="txt-title" class="text-2xl font-bold text-[#2C3E50]">ซักประวัติและคำแนะนำ</h1>
            <p id="txt-subtitle" class="text-xs font-medium text-gray-400 mt-1 uppercase tracking-wider">Please select service / ကျေးဇူးပြု၍ ရွေးချယ်ပါ</p>
        </div>

        <div class="bg-gray-100/80 p-1.5 rounded-2xl flex gap-1.5 mb-6">
            <button id="btn-th" onclick="setLang('th')" class="flex-1 py-2 rounded-xl text-sm font-semibold transition-all duration-300 bg-white text-[#4A90E2] shadow-sm ring-1 ring-black/5">ไทย</button>
            <button id="btn-my" onclick="setLang('my')" class="flex-1 py-2 rounded-xl text-sm font-semibold transition-all duration-300 text-gray-500 hover:text-gray-700">Burmese</button>
            <button id="btn-en" onclick="setLang('en')" class="flex-1 py-2 rounded-xl text-sm font-semibold transition-all duration-300 text-gray-500 hover:text-gray-700">English</button>
        </div>

        <div class="space-y-4">
            
            <button onclick="handleNavigation('https://script.google.com/macros/s/AKfycbxw2ujiV03liyfGcAQF7PlBtTIxYPJOvDnyKxF0oCy4rBSwwRrZc3ba97JhqhhZvX6MtQ/exec')" 
                class="btn-press w-full group flex items-center p-4 bg-[#FFEBEF] hover:bg-[#FFDEE5] border-2 border-[#FFC2CD] rounded-2xl shadow-[0_8px_20px_rgba(255,210,220,0.4)]">
                <div class="flex-shrink-0 w-12 h-12 bg-white text-[#FF5A79] rounded-xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                </div>
                <div class="ml-4 text-left flex-1">
                    <h2 id="txt-menu1" class="text-base font-bold text-[#5C2530]">บันทึกอาการส่งเจ้าหน้าที่</h2>
                    <p id="txt-desc1" class="text-xs font-medium text-[#A66371]">กรอกข้อมูลอาการป่วยเบื้องต้น</p>
                </div>
                <div class="text-[#FF9EAF] group-hover:translate-x-1 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </button>

            <button onclick="handleNavigation('https://script.google.com/macros/s/AKfycbwY9CohECRH-WqmdS08pNLHnym237S2XnNBONWeyK7grrWGjeb3Jsy0dXMSAC5IFx5s/exec')" 
                class="btn-press w-full group flex items-center p-4 bg-[#E8F8F0] hover:bg-[#D4F3E3] border-2 border-[#A3E4D7] rounded-2xl shadow-[0_8px_20px_rgba(200,240,220,0.4)]">
                <div class="flex-shrink-0 w-12 h-12 bg-white text-[#27AE60] rounded-xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4 1.253" />
                    </svg>
                </div>
                <div class="ml-4 text-left flex-1">
                    <h2 id="txt-menu2" class="text-base font-bold text-[#145A32]">คำแนะนำและการปฏิบัติตัว</h2>
                    <p id="txt-desc2" class="text-xs font-medium text-[#227F46]">วิธีดูแลสุขภาพเบื้องต้น</p>
                </div>
                <div class="text-[#7DCEA0] group-hover:translate-x-1 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </button>

        </div>

        <div class="mt-8 pt-4 border-t border-dashed border-gray-200 text-center">
            <p id="txt-footer" class="text-sm font-semibold text-[#566573]">
                ด้วยความปรารถนาดีจาก <span class="text-[#FF5A79]">รพ.สต.บ้านขอม</span>
            </p>
        </div>
    </div>

    <script>
        // ชุดข้อมูล 3 ภาษา สไตล์พาสเทลละมุน
        const langData = {
            th: {
                title: "ซักประวัติและคำแนะนำ",
                subtitle: "Please select service / ကျေးဇူးပြု၍ ရွေးချယ်ပါ",
                menu1: "บันทึกอาการส่งเจ้าหน้าที่",
                desc1: "กรอกข้อมูลอาการป่วยเบื้องต้น",
                menu2: "คำแนะนำและการปฏิบัติตัว",
                desc2: "วิธีดูแลสุขภาพเบื้องต้น",
                footer: "ด้วยความปรารถนาดีจาก <span class='text-[#FF5A79] font-bold'>รพ.สต.บ้านขอม</span>",
                loadingTitle: "กำลังเปิดระบบ...",
                loadingText: "กรุณารอสักครู่นะคะ"
            },
            my: {
                title: "ရောဂါရာဇဝင်နှင့် အကြံပြုချက်",
                subtitle: "Please select service / ကျေးဇူးပြု၍ ရွေးချယ်ပါ",
                menu1: "อาการป่วยบันทึกส่งเจ้าหน้าที่",
                desc1: "သင့်ရောဂါလက္ခဏာများကို ဖြည့်စွက်ပါ",
                menu2: "คำแนะนำและการปฏิบัติตัว",
                desc2: "ကျန်းမာရေးစောင့်ရှောက်မှု အကြံပြုချက်များ",
                footer: "နွေးထွေးစွာဖြင့် ဆုမွန်ကောင်းတောင်းအပ်ပါသည် <br><span class='text-[#FF5A79] font-bold'>Baan Khom ရพ.สต.</span>",
                loadingTitle: "စနစ်ကို ဖွင့်နေပါသည်...",
                loadingText: "ခဏစောင့်ပေးပါနော်"
            },
            en: {
                title: "History & Medical Advice",
                subtitle: "Please select service / ကျေးဇူးပြု၍ ရွေးချယ်ပါ",
                menu1: "Record Symptoms to Staff",
                desc1: "Fill out your initial symptoms",
                menu2: "Health Care & Instructions",
                desc2: "Basic self-care instructions",
                footer: "Best wishes from <span class='text-[#FF5A79] font-bold'>Baan Khom Health Center</span>",
                loadingTitle: "Opening System...",
                loadingText: "Please wait a moment"
            }
        };

        let currentLang = 'th';

        function setLang(lang) {
            currentLang = lang;
            const d = langData[lang];

            document.getElementById('txt-title').innerText = d.title;
            document.getElementById('txt-subtitle').innerText = d.subtitle;
            document.getElementById('txt-menu1').innerText = d.menu1;
            document.getElementById('txt-desc1').innerText = d.desc1;
            document.getElementById('txt-menu2').innerText = d.menu2;
            document.getElementById('txt-desc2').innerText = d.desc2;
            document.getElementById('txt-footer').innerHTML = d.footer;

            // ปรับแต่งสีปุ่มสลับภาษาที่เลือก (Active ให้เป็นสีฟ้าพาสเทลเด่นขึ้นมา)
            const btns = ['th', 'my', 'en'];
            btns.forEach(b => {
                const el = document.getElementById('btn-' + b);
                if (b === lang) {
                    el.className = "flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-300 bg-white text-[#4A90E2] shadow-sm ring-1 ring-black/5";
                } else {
                    el.className = "flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-300 text-gray-400 hover:text-gray-600 bg-transparent";
                }
            });
        }

        // ฟังก์ชันหน่วงเวลาเปิดลิงก์พร้อมแสดง SweetAlert2 โทนสีเข้ากัน
        function handleNavigation(url) {
            const text = langData[currentLang];
            
            Swal.fire({
                title: text.loadingTitle,
                text: text.loadingText,
                allowOutsideClick: false,
                showConfirmButton: false,
                color: '#2C3E50',
                background: '#FFFFFF',
                // ปรับแต่งตัว Loading สปินเนอร์ให้เป็นสีชมพูพาสเทลแมตช์กับเว็บ
                didOpen: () => {
                    Swal.showLoading();
                    const spinner = document.querySelector('.swal2-loader');
                    if(spinner) spinner.style.borderColor = '#FF5A79 transparent #FF5A79 transparent';
                    
                    setTimeout(() => {
                        window.location.href = url;
                    }, 800); // หน่วงเวลา 0.8 วินาทีให้ดูนุ่มนวล
                }
            });
        }
    </script>
</body>
</html>
